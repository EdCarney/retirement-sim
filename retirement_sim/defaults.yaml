# Default capital-market assumptions (nominal, annual, arithmetic mean/vol).
# Any value here can be overridden by a `market:` block in the user config;
# user values are deep-merged on top of these.
#
# Rationale:
#   stocks    ~10% nominal long-run US large-cap, held slightly conservative
#   bonds     aggregate/intermediate bonds, ~2% real
#   cash      T-bills, roughly inflation + 0.5%
#   inflation Fed 2% target plus a modest premium; i.i.d. draws (no persistence)
market:
  # How annual returns and inflation are drawn:
  #   parametric  correlated lognormal from the mean/vol/correlations below (default)
  #   student_t   same moments, but fat-tailed Student-t shocks (see student_t.df);
  #               crashes and booms are more extreme than the lognormal allows
  #   bootstrap   resample multi-year blocks of actual 1928+ US history, keeping
  #               fat tails AND sequence risk. The mean/vol/correlation settings
  #               below are IGNORED in this mode. Consider simulation.n_sims of
  #               25000+ for smoother tails.
  method: parametric
  student_t:
    df: 6  # degrees of freedom; lower = fatter tails (must be > 2)
  bootstrap:
    block_years: 5  # length (years) of history blocks resampled jointly
    # data: my_returns.csv  # optional CSV: year,<one column per asset>,inflation
  asset_classes:
    stocks: {mean: 0.095, vol: 0.16}
    bonds: {mean: 0.045, vol: 0.06}
    cash: {mean: 0.030, vol: 0.015}
  inflation: {mean: 0.025, vol: 0.015}
  # Symmetric pairwise correlations; series order is asset classes + inflation.
  # Unlisted pairs default to 0.
  correlations:
    stocks_bonds: 0.10
    stocks_cash: 0.00
    stocks_inflation: -0.20
    bonds_cash: 0.30
    bonds_inflation: -0.30
    cash_inflation: 0.50
